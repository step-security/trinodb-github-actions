name: NPM Audit Fix Run

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Use --force flag for npm audit fix?"
        required: true
        type: boolean
      base_branch:
        description: "Specify a base branch"
        required: false
        default: "main"
      node_version:
        description: "Specify Node.js version (e.g., '20', '24', 'lts/*')"
        required: false
        default: "24"
      working_directory:
        description: "Working directories to run commands in (comma-separated, optional)"
        required: false
        type: string
        default: "action-surefire-report,block-commits,github-app-token,slash-command-dispatch"
  schedule:
    - cron: "0 0 * * 1"

jobs:
  audit-fix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - working_directory: action-surefire-report
            script: npm run package
            package_manager: npm
          - working_directory: block-commits
            script: npm test
            package_manager: npm
          - working_directory: github-app-token
            script: yarn build
            package_manager: yarn
          - working_directory: slash-command-dispatch
            script: npm run build
            package_manager: npm
    uses: step-security/reusable-workflows/.github/workflows/audit_fix.yml@v1
    with:
      force: ${{ inputs.force || false }}
      base_branch: ${{ inputs.base_branch || 'main' }}
      script: ${{ matrix.script }}
      package_manager: ${{ matrix.package_manager }}
      node_version: "${{ inputs.node_version || '24' }}"
      working_directory: ${{ matrix.working_directory }}

permissions:
  contents: write
  pull-requests: write
  packages: read
  issues: write
