name: Release GitHub Actions

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the release"
        required: true
      script:
        description: "Build script to run (must install common's deps because both github-action and merge tsc-reference ../common)"
        required: false
        default: "npm run build"
      node_version:
        description: "Node.js version to use"
        required: false
        default: "24"
      working_directory:
        description: "Comma-separated list of action directories to build"
        required: false
        default: "github-app-token,slash-command-dispatch"

permissions:
  contents: read

jobs:
  release:
    permissions:
      actions: read
      id-token: write
      contents: write

    uses: step-security/reusable-workflows/.github/workflows/actions_release.yaml@v1
    with:
      tag: "${{ github.event.inputs.tag }}"
      script: ${{ inputs.script }}
      node_version: ${{ inputs.node_version || '24' }}
      working_directory: ${{ inputs.working_directory || 'github-app-token,slash-command-dispatch' }}