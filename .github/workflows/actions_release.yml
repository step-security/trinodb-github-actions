name: Release GitHub Actions

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the release"
        required: true
      node_version:
        description: "Node.js version to use"
        required: false
        default: "24"
      working_directory:
        description: "Comma-separated list of node-based action directories to release"
        required: false
        default: "github-app-token,slash-command-dispatch"

permissions:
  contents: read

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - working_directory: github-app-token
            script: yarn build
            package_manager: yarn
          - working_directory: slash-command-dispatch
            script: npm run build
            package_manager: npm
    permissions:
      actions: read
      id-token: write
      contents: write

    uses: step-security/reusable-workflows/.github/workflows/actions_release.yaml@v1
    with:
      tag: "${{ github.event.inputs.tag }}"
      script: ${{ matrix.script }}
      package_manager: ${{ matrix.package_manager }}
      node_version: ${{ inputs.node_version || '24' }}
      working_directory: ${{ matrix.working_directory }}
