name: "checkout-and-setup"
description: "Checkout the right branch and optionally setup Java"
inputs:
  java-version:
    description: "Java version to setup"
    default: 17
  cache:
    description: "Java setup cache type"
    default: 'maven'

runs:
  using: composite
  steps:
      - name: Subscription check
        env:
          REPO_PRIVATE: ${{ github.event.repository.private }}
        run: |
          # validate subscription status
          UPSTREAM="trinodb/github-actions"
          ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"
          DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"

          echo ""
          echo -e "\033[1;36mStepSecurity Maintained Action\033[0m"
          echo "Secure drop-in replacement for $UPSTREAM"
          if [ "$REPO_PRIVATE" = "false" ]; then
            echo -e "\033[32m✓ Free for public repositories\033[0m"
          fi
          echo -e "\033[36mLearn more:\033[0m $DOCS_URL"
          echo ""

          if [ "$REPO_PRIVATE" != "false" ]; then
            SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

            if [ "$SERVER_URL" != "https://github.com" ]; then
              BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
            else
              BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
            fi

            API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

            RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

            if [ $CURL_EXIT_CODE -ne 0 ]; then
              echo "Timeout or API not reachable. Continuing to next step."
            elif [ "$RESPONSE" = "403" ]; then
              echo -e "::error::\033[1;31mThis action requires a StepSecurity subscription for private repositories.\033[0m"
              echo -e "::error::\033[31mLearn how to enable a subscription: $DOCS_URL\033[0m"
              exit 1
            fi
          fi
        shell: bash
      - uses: actions/checkout@v6
        with:
          # checkout all commits, as the build result depends on `git describe` equivalent
          # and to be able to determine merge base for GIB
          fetch-depth: 0
          ref: |
            ${{ github.event_name == 'repository_dispatch' &&
                github.event.client_payload.pull_request.head.sha == github.event.client_payload.slash_command.args.named.sha &&
                format('refs/pull/{0}/head', github.event.client_payload.pull_request.number) || '' }}
      - name: Verify args
        shell: bash
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.slash_command.args.named.sha == ''
        run: |
          echo >&2 "Dispatched from a slash command but missing the 'sha' argument"
          exit 1
      - name: Verify commit
        shell: bash
        run: |
          expected=${{ github.event_name == 'repository_dispatch' &&
                github.event.client_payload.pull_request.head.sha || '' }}
          actual=$(git log -1 --format='%H')
          if [ -n "$expected" ] && [ "$actual" != "$expected" ]; then
            echo >&2 "Expected to checkout $expected but got $actual"
            exit 1
          fi
      - name: Fetch base ref to find merge-base for GIB
        shell: bash
        run: .github/bin/git-fetch-base-ref.sh
      - uses: actions/setup-java@v5
        if: ${{ inputs.java-version != '' }}
        with:
          distribution: 'zulu'
          java-version: ${{ inputs.java-version }}
          cache: ${{ inputs.cache }}
      - name: Configure Problem Matchers
        if: ${{ inputs.java-version != '' }}
        shell: bash
        run: echo "::add-matcher::.github/problem-matcher.json"
